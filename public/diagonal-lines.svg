<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <pattern id="dash" width="100" height="100" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="-50" y1="50" x2="150" y2="50" stroke="#e8856a" stroke-width="1" stroke-dasharray="20 20"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#dash)"/>
</svg>
